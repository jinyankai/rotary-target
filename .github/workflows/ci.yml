name: ci

on:
  push:
  pull_request:

jobs:
  lightweight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Run lightweight checks
        run: python scripts/run_checks.py
